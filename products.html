<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>VIVAAN BABY CARE - Products Catalog</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            vivaanPink: '#FF708A',
            vivaanMint: '#9ED2C6',
            vivaanPeach: '#FFD3B6',
            vivaanButter: '#FFFDF9',
            vivaanDark: '#2C3A47',
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 flex justify-center">

  <!-- Mobile Screen Container -->
  <div class="w-full max-w-md bg-white min-h-screen relative flex flex-col shadow-2xl overflow-hidden bottom-nav-pad">
    
    <!-- Top Navbar with Back and Title -->
    <header class="sticky top-0 bg-white z-40 px-4 py-3.5 border-b border-gray-50 flex items-center justify-between shadow-sm">
      <div class="flex items-center space-x-3 overflow-hidden mr-2">
        <button onclick="window.history.back()" class="text-vivaanDark p-1 active-scale flex-shrink-0">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
          </svg>
        </button>
        <div class="flex flex-col overflow-hidden">
          <span id="catalog-title" class="text-sm font-extrabold text-vivaanDark truncate">Loading Catalog...</span>
          <span id="catalog-subtitle" class="text-[10px] text-gray-400 font-bold truncate">0 Items found</span>
        </div>
      </div>
      
      <!-- Icons -->
      <div class="flex items-center space-x-2">
        <a href="cart.html" class="relative text-vivaanDark active-scale p-1">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
          </svg>
          <span class="absolute -top-1 -right-1 bg-vivaanPink text-white text-[9px] font-bold px-1.5 py-0.5 rounded-full cart-badge hidden">0</span>
        </a>
      </div>
    </header>

    <!-- Search in catalog input -->
    <div class="px-4 py-2 bg-gray-50 border-b border-gray-100 flex items-center justify-between">
      <div class="relative flex-1 mr-3">
        <span class="absolute left-3 top-2 text-gray-400">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
        </span>
        <input type="text" id="catalog-search-input" placeholder="Search within results..." 
               class="w-full pl-9 pr-3 py-1.5 bg-white border border-gray-200 rounded-xl text-xs text-vivaanDark focus:outline-none focus:ring-1 focus:ring-vivaanPink focus:border-vivaanPink transition-all shadow-sm">
      </div>

      <!-- Sorting Selector Dropdown -->
      <div class="relative">
        <select id="sort-selector" class="appearance-none bg-white border border-gray-200 text-[10px] font-bold text-vivaanDark px-3 py-1.5 pr-6 rounded-xl focus:outline-none focus:ring-1 focus:ring-vivaanPink focus:border-vivaanPink shadow-sm cursor-pointer">
          <option value="popularity">🔥 Popularity</option>
          <option value="low-high">📈 Price: Low to High</option>
          <option value="high-low">📉 Price: High to Low</option>
          <option value="rating">⭐ Top Rated</option>
        </select>
        <!-- Custom down arrow -->
        <span class="absolute right-2 top-2.5 text-gray-400 pointer-events-none">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
          </svg>
        </span>
      </div>
    </div>

    <!-- MAIN GRID CONTAINER -->
    <main class="flex-1 overflow-y-auto p-4">
      <div id="catalog-products-grid" class="grid grid-cols-2 gap-4">
        <!-- Skeleton Loading -->
        <div class="bg-white rounded-2xl p-2.5 shadow-sm border border-gray-50 animate-pulse-slow">
          <div class="bg-gray-100 rounded-xl h-44 mb-2"></div>
          <div class="h-3 bg-gray-100 rounded mb-1"></div>
          <div class="h-3 bg-gray-100 rounded w-1/2"></div>
        </div>
        <div class="bg-white rounded-2xl p-2.5 shadow-sm border border-gray-50 animate-pulse-slow">
          <div class="bg-gray-100 rounded-xl h-44 mb-2"></div>
          <div class="h-3 bg-gray-100 rounded mb-1"></div>
          <div class="h-3 bg-gray-100 rounded w-1/2"></div>
        </div>
      </div>
    </main>

    <!-- Bottom Fixed Navigation Bar -->
    <footer class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t border-gray-100 py-2.5 px-6 flex justify-between items-center z-50 shadow-nav">
      <a href="index.html" class="flex flex-col items-center justify-center space-y-1 text-gray-400 active-scale" id="nav-home">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
        </svg>
        <span class="text-[9px] font-bold">Home</span>
      </a>
      <a href="categories.html" class="flex flex-col items-center justify-center space-y-1 text-gray-400 active-scale" id="nav-categories">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7" />
        </svg>
        <span class="text-[9px] font-bold">Categories</span>
      </a>
      <a href="wishlist.html" class="flex flex-col items-center justify-center space-y-1 text-gray-400 active-scale relative" id="nav-wishlist">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
        </svg>
        <span class="absolute -top-1 right-2 bg-vivaanPink text-white text-[8px] font-bold px-1 py-0.25 rounded-full wishlist-badge hidden">0</span>
        <span class="text-[9px] font-bold">Wishlist</span>
      </a>
      <a href="cart.html" class="flex flex-col items-center justify-center space-y-1 text-gray-400 active-scale relative" id="nav-cart">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
        </svg>
        <span class="absolute -top-1 right-1 bg-vivaanPink text-white text-[8px] font-bold px-1 py-0.25 rounded-full cart-badge hidden">0</span>
        <span class="text-[9px] font-bold">Cart</span>
      </a>
    </footer>

  </div>

  <!-- Toast Element container -->
  <div id="toast"></div>

  <!-- Scripts -->
   <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="shared.js"></script>
  <script src="products.js"></script>
</body>
</html>
