<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Product Details</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Navbar -->

  <nav class="navbar">

    <div class="logo">
      <img src="vivaan.png">
    </div>

    <div class="nav-right">

      <input type="text" placeholder="Search products...">

      <ul class="nav-links">
        <li>Home</li>
        <li>Products</li>
        <li>Cart 🛒</li>
      </ul>

    </div>

  </nav>

  <!-- Product Details -->

  <section class="product-page">

    <!-- Left -->

    <div class="product-image">

      <img src="https://images.unsplash.com/photo-1515488042361-ee00e0ddd4e4?q=80&w=1000">

    </div>

    <!-- Right -->

    <div class="product-details">

      <h1>Baby Pink Dress</h1>

      <p class="product-price">₹799</p>

      <p class="product-description">

        Cute premium baby dress perfect for parties and special occasions.

      </p>

      <!-- Size -->

      <h3>Select Size</h3>

      <div class="sizes">

        <button>S</button>
        <button>M</button>
        <button>L</button>

      </div>

      <!-- Colors -->

      <h3>Select Color</h3>

      <div class="colors">

        <span class="pink"></span>
        <span class="blue"></span>
        <span class="yellow"></span>

      </div>

      <!-- Buttons -->

      <div class="product-buttons">

        <button class="cart-btn">
          Add To Cart
        </button>

        <button class="buy-btn">
          Buy Now
        </button>

      </div>

    </div>

  </section>

</body>
</html>
