<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Vivaan Baby Care</title>

  <link rel="stylesheet" href="style.css">

  <!-- Icons -->

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />

</head>

<body>

  <!-- TOP NAVBAR -->

  <nav class="mobile-navbar">

    <div class="top-left">

      <img src="vivaan.png" class="logo">

    </div>

    <div class="top-icons">

      <i class="fa-solid fa-magnifying-glass"></i>

      <i class="fa-regular fa-heart"></i>

      <i class="fa-solid fa-bag-shopping"></i>

    </div>

  </nav>

  <!-- SEARCH -->

  <div class="search-box">

    <input
      type="text"
      placeholder="Search baby products..."
    >

  </div>

  <!-- CATEGORY PILLS -->

  <section class="pills">

    <div class="pill">🔥 Crazy Deals</div>

    <div class="pill">⭐ Top Brands</div>

    <div class="pill">🧸 Toys</div>

    <div class="pill">👕 Dresses</div>

    <div class="pill">🎁 Accessories</div>

  </section>

  <!-- OFFER BANNER -->

  <section class="offer-banner">

    <div class="offer-left">

      <h3>Free Shipping</h3>

      <p>On your first order</p>

    </div>

    <div class="offer-right">

      <h3>₹500 OFF</h3>

      <p>VIVAAN500</p>

    </div>

  </section>

  <!-- HERO BANNER -->

  <section class="hero-banner">

    <img
      src="https://images.unsplash.com/photo-1519238263530-99bdd11df2ea?q=80&w=1600"
    >

  </section>

  <!-- PRODUCTS -->

  <section class="products-section">

    <h2>Featured Products</h2>

    <div class="product-container">

    </div>

  </section>

  <!-- BOTTOM NAVIGATION -->

  <div class="bottom-nav">

    <div class="bottom-item">
      <i class="fa-solid fa-house"></i>
      <p>Home</p>
    </div>

    <div class="bottom-item">
      <i class="fa-solid fa-list"></i>
      <p>Categories</p>
    </div>

    <div class="bottom-item">
      <i class="fa-solid fa-heart"></i>
      <p>Wishlist</p>
    </div>

    <div class="bottom-item">
      <i class="fa-solid fa-cart-shopping"></i>
      <p>Cart</p>
    </div>

  </div>

  <!-- SUPABASE -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script src="script.js"></script>

</body>

</html>
